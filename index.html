<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff">
  <title>我的个人网站</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23111'/><text x='50' y='66' font-size='48' text-anchor='middle' fill='white' font-family='Inter,sans-serif' font-weight='700'>P</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app" id="app"></div>

  <nav class="tab-bar" id="tabBar">
    <button class="tab on" data-t="home">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>首页</span>
    </button>
    <button class="tab" data-t="works">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
      <span>项目</span>
    </button>
    <button class="tab" data-t="blog">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span>博客</span>
    </button>
    <button class="tab" data-t="me">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>我的</span>
    </button>
  </nav>

  <div class="sheet-mask" id="mask"></div>
  <div class="sheet" id="sheet"><div class="sheet-bar"></div><div class="sheet-body" id="sheetBody"></div></div>

  <!-- AI 助手 -->
  <button class="ai-fab" id="aiFab" title="AI 助手">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
  </button>
  <div class="ai-panel" id="aiPanel">
    <div class="ai-panel__hd">
      <div>
        <div style="font-weight:700;font-size:.95rem">AI 助手</div>
        <div style="font-size:.75rem;color:var(--t3)">可以问我任何关于这个网站的问题</div>
      </div>
      <button class="ai-panel__close" id="aiClose">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="ai-panel__msgs" id="aiMsgs">
      <div class="ai-msg ai-msg--bot">
        <div class="ai-msg__bubble">👋 你好！我是 AI 助手，可以帮你搜索项目、文章或了解关于我的信息。<br><br>试试问我：<br>• 「有哪些项目？」<br>• 「最近写了什么？」<br>• 「怎么联系？」</div>
      </div>
    </div>
    <div class="ai-panel__input">
      <input type="text" class="ai-input" id="aiInput" placeholder="输入你的问题..." autocomplete="off">
      <button class="ai-send" id="aiSend">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
